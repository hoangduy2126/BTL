<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRTX Studio</title>
    <meta name="description"
        content="VRTX Studio — Creating memorable brand experiences for impact.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/webp" href="./assets/images/VRTX_LOGO.webp">
    <style>
        /* ── Index-specific overrides ─────────────────────── */
        body {
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* ── Fixed overlay shell ──────────────────────────── */
        #ui-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        /* Override header to be static inside fixed overlay */
        #ui-overlay header {
            position: static;
            background: transparent !important;
            backdrop-filter: none !important;
            border-bottom: none !important;
        }

        #ui-overlay .header-nav {
            pointer-events: all;
        }

        /* ── Footer strip ─────────────────────────────────── */
        #ui-overlay footer {
            margin-top: 0;
            padding-bottom: 2rem;
        }

        /* ── Scroll CTA arrow ─────────────────────────────── */
        .index-cta {
            display: inline-flex;
            flex-direction: row;
            align-items: center;
            gap: 0.8rem;
            pointer-events: all;
            padding: 0.5rem 0.5rem 0.5rem 1.4rem;
            border-radius: 999px;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.4s ease;
            border: 1px solid transparent;
            z-index: 1;
        }

        .index-cta::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--cyan), var(--green), var(--gold), var(--magenta), var(--cyan), var(--green), var(--gold));
            background-size: 600% 600%;
            animation: nav-gradient-flow 10s ease-in-out infinite;
            z-index: -1;
            transform-origin: right;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .index-cta:hover {
            transform: scale(1.05);
            border-color: var(--cyan);
        }

        .index-cta:hover::before {
            transform: scaleX(0);
        }

        .index-cta-text {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            position: relative;
            z-index: 2;
            transition: color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .index-cta:hover .index-cta-text {
            color: var(--cyan);
        }

        .index-cta-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #fff;
            color: var(--cyan);
            border: 1px solid transparent;
            position: relative;
            z-index: 2;
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.5s ease;
        }

        .index-cta-arrow svg {
            width: 14px;
            height: 14px;
            margin-top: 2px;
        }

        .index-cta:hover .index-cta-arrow {
            background: transparent;
            color: var(--cyan);
            border-color: var(--cyan);
        }

        /* Footer meta adjustments */
        .index-footer {
            display: flex;
            width: 100%;
            justify-content: space-between;
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #fff;
            padding: 0;
        }
    </style>


</head>

<body>
    <script>if(localStorage.getItem('vrtx-theme') === 'light') document.body.classList.add('light-mode');</script>
    <!-- Custom Cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Page Transition Overlay -->
    <div id="page-transition"></div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-logo-container">
            <img src="./assets/images/VRTX_LOGO.webp" class="loading-logo-icon" alt="Logo">
            <div class="loading-text-container">
                <span class="loading-vertex">VRTX</span>
                <span class="loading-studio">STUDIO</span>
            </div>
        </div>
        <div class="loading-bar-wrap">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-label">Initializing 3D Environment</div>
    </div>

    <!-- Mobile Nav -->
    <nav id="mobile-nav" class="mobile-nav">
        <a href="./index.html" class="nav-link active">Home</a>
        <a href="./works.html" class="nav-link">Work</a>
        <a href="./services.html" class="nav-link">Services</a>
        <a href="./about.html" class="nav-link">About</a>
        <a href="./contact.html" class="pill-btn">Contact Us</a>
    </nav>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <header>
            <a href="./index.html" class="header-logo" aria-label="HOME">
                <img src="./assets/images/VRTX_LOGO.webp" alt="VRTX Logo" class="logo-mark">
                <div class="logo-text">
                    <span class="logo-vertex">VRTX</span>
                    <span class="logo-studio">STUDIO</span>
                </div>
            </a>
            <nav class="header-nav">
                <a href="./works.html" class="nav-link">Work</a>
                <a href="./services.html" class="nav-link">Services</a>
                <a href="./about.html" class="nav-link">About</a>
                <a href="./contact.html" class="pill-btn">Contact Us</a>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="hamburger" id="hamburger" aria-label="Open menu">
                    <span></span><span></span><span></span>
                </button>
            </nav>
        </header>

        <footer>
            <a href="./works.html" class="index-cta">
                <span class="index-cta-text">Explore our work</span>
                <span class="index-cta-arrow">
                    <svg viewBox="0 0 24 24"><path d="M5 12h14m0 0l-6-6m6 6l-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
            </a>
            <div class="index-footer">
                <span>[ Drag to Orbit ]</span>
                <span>&copy; 2026 VRTX Inc.</span>
            </div>
        </footer>
    </div>

    <script type="module" src="./main.js"></script>
    <script type="module" src="./cursor.js"></script>
    <script type="module" src="./transitions.js"></script>
</body>

</html>
