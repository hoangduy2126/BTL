<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRTX Studio | Creating Memorable Brand Experiences</title>
    <meta name="description"
        content="VRTX Studio — Creating memorable brand experiences for impact.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/webp" href="./assets/images/VRTX_LOGO.webp">
    <style>
        /* ── Index-specific overrides ─────────────────────── */
        body {
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* ── Fixed overlay shell ──────────────────────────── */
        #ui-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        /* Override header to be static inside fixed overlay */
        #ui-overlay header {
            position: static;
            background: transparent !important;
            backdrop-filter: none !important;
            border-bottom: none !important;
        }

        #ui-overlay .header-nav {
            pointer-events: all;
        }

        /* ── Footer strip ─────────────────────────────────── */
        #ui-overlay footer {
            margin-top: 0;
        }

        /* ── Scroll CTA arrow ─────────────────────────────── */
        .index-cta {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            pointer-events: all;
        }

        .index-cta-text {
            font-size: 0.65rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.25s;
        }

        .index-cta-arrow {
            display: block;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            text-decoration: none;
            transition: border-color 0.3s, color 0.3s, transform 0.3s, background 0.3s;
            animation: float-arrow 2.2s ease-in-out infinite;
        }

        @keyframes float-arrow {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(5px);
            }
        }

        .index-cta:hover .index-cta-text {
            color: rgba(255, 255, 255, 0.65);
        }

        .index-cta:hover .index-cta-arrow {
            border-color: rgba(255, 255, 255, 0.5);
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Footer meta adjustments */
        .index-footer {
            display: flex;
            width: 100%;
            justify-content: space-between;
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.28);
            padding: 0 3rem 3.5rem;
        }
    </style>

    <!-- Import maps for Three.js -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>

    <!-- Custom Cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Page Transition Overlay -->
    <div id="page-transition"></div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-logo">VRTX</div>
        <div class="loading-bar-wrap">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-label">Initializing 3D Environment</div>
    </div>

    <!-- Mobile Nav -->
    <nav id="mobile-nav" class="mobile-nav">
        <a href="./index.html" class="nav-link active">Home</a>
        <a href="./about.html" class="nav-link">About</a>
        <a href="./works.html" class="nav-link">Work</a>
        <a href="./contact.html" class="nav-link">Contact</a>
        <a href="./contact.html" class="pill-btn">New Creative Lab</a>
        <a href="./contact.html" class="cta-btn">Let's Talk</a>
    </nav>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <header>
            <div class="header-logo">VRTX Studio</div>
            <nav class="header-nav">
                <a href="./about.html" class="nav-link">About</a>
                <a href="./works.html" class="nav-link">Work</a>
                <a href="./contact.html" class="nav-link">Contact</a>
                <a href="./contact.html" class="pill-btn">New Creative Lab</a>
                <a href="./contact.html" class="cta-btn">Let's Talk</a>
                <button class="hamburger" id="hamburger" aria-label="Open menu">
                    <span></span><span></span><span></span>
                </button>
            </nav>
        </header>

        <footer>
            <a href="./works.html" class="index-cta">
                <span class="index-cta-text">Explore our work</span>
                <span class="index-cta-arrow">↓</span>
            </a>
            <div class="index-footer">
                <span>[ Drag to Orbit ]</span>
                <span>&copy; 2026 VRTX Inc.</span>
            </div>
        </footer>
    </div>

    <script type="module" src="./main.js"></script>
    <script src="./cursor.js"></script>
    <script src="./transitions.js"></script>
</body>

</html>
