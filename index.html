<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRTX Studio | Creating Memorable Brand Experiences</title>
    <meta name="description" content="VRTX Studio — Creating memorable brand experiences not for attention but for impact.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* ── UI Overlay ─────────────────────────────────────── */
        #ui-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        /* ── Header ─────────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2rem 3rem;
        }

        .header-logo {
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #fff;
            opacity: 0.95;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 2rem;
            pointer-events: all;
        }

        .nav-link {
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: color 0.25s;
        }
        .nav-link:hover { color: #fff; }

        /* Green pill button */
        .pill-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.42rem 1.1rem;
            border-radius: 999px;
            background: rgba(74, 222, 128, 0.18);
            border: 1px solid rgba(74, 222, 128, 0.55);
            color: #4ade80;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.25s, border-color 0.25s;
        }
        .pill-btn::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 6px #4ade80;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(0.7); }
        }
        .pill-btn:hover {
            background: rgba(74, 222, 128, 0.28);
            border-color: rgba(74, 222, 128, 0.9);
        }

        /* CTA button */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            padding: 0.42rem 1.3rem;
            border-radius: 999px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.35);
            color: rgba(255,255,255,0.85);
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.25s, border-color 0.25s, color 0.25s;
        }
        .cta-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.7);
            color: #fff;
        }

        /* ── Footer / Tagline ───────────────────────────────── */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 3rem 3.5rem;
            gap: 2.5rem;
        }

        .tagline {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: clamp(0.95rem, 1.5vw, 1.25rem);
            font-weight: 400;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.02em;
            text-align: center;
            max-width: 540px;
            line-height: 1.6;
        }

        .footer-meta {
            display: flex;
            width: 100%;
            justify-content: space-between;
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }

        /* ── Loading screen ─────────────────────────────────── */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            z-index: 999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .loading-logo {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.9);
        }
        .loading-bar-wrap {
            width: 160px;
            height: 1px;
            background: rgba(255,255,255,0.12);
            overflow: hidden;
        }
        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ff00cc);
            animation: load-bar 1.8s cubic-bezier(.4,0,.2,1) forwards;
        }
        @keyframes load-bar { from { width: 0; } to { width: 100%; } }
        .loading-label {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }
    </style>

    <!-- Import maps -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-logo">VRTX</div>
        <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
        <div class="loading-label">Initializing 3D Environment</div>
    </div>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <header>
            <div class="header-logo">VRTX Studio</div>
            <nav class="header-nav">
                <a href="./about.html" class="nav-link">About</a>
                <a href="./works.html" class="nav-link">Work</a>
                <a href="./contact.html" class="nav-link">Contact</a>
                <a href="./contact.html" class="pill-btn">New Creative Lab</a>
                <a href="./contact.html" class="cta-btn">Let's Talk</a>
            </nav>
        </header>

        <footer>
            <p class="tagline">Creating memorable brand experiences not for attention but for impact.</p>
            <div class="footer-meta">
                <span>[ Drag to Orbit ]</span>
                <span>&copy; 2026 VRTX Inc.</span>
            </div>
        </footer>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
